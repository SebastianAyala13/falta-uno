name: Aplicar migraciones a Supabase (prod)

# Aplica las migraciones pendientes de supabase/migrations/ a producción con
# `supabase db push` cada vez que se mergea a main un cambio de schema.
# Requiere los secrets del repo: SUPABASE_ACCESS_TOKEN y SUPABASE_DB_PASSWORD.
# (Edge Functions y secrets NO se despliegan acá — se gestionan en el dashboard.)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'

# Nunca correr dos db push en paralelo contra la misma base.
concurrency:
  group: db-migrations
  cancel-in-progress: false

jobs:
  db-push:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: gwkzcjgsuxgqejaukbse
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link al proyecto
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Aplicar migraciones pendientes
        run: supabase db push

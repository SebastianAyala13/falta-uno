name: Aplicar migraciones a Supabase (prod)

# Aplica las migraciones pendientes de supabase/migrations/ a producción con
# `supabase db push` cada vez que se mergea a main un cambio de schema.
# Requiere el secret del repo SUPABASE_ACCESS_TOKEN (el CLI 2.x autentica la
# conexión a la base con el access token, sin DB password). Si una versión del
# CLI llegara a pedir la password, agregá el secret SUPABASE_DB_PASSWORD y
# volvé a exponerlo con `env:` en los steps `link` y `db push`.
# (Edge Functions y secrets NO se despliegan acá — se gestionan en el dashboard.)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'

# Least privilege: este workflow solo necesita leer el repo.
permissions:
  contents: read

# Nunca correr dos db push en paralelo contra la misma base.
concurrency:
  group: db-migrations
  cancel-in-progress: false

jobs:
  db-push:
    runs-on: ubuntu-latest
    env:
      PROJECT_REF: gwkzcjgsuxgqejaukbse # público (está en la URL de Supabase), no es secreto
    steps:
      # Actions pinneadas a SHA completo (supply-chain); el comentario indica la versión.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1
        with:
          version: 2.109.1

      # El secret se pasa SOLO a los steps que lo usan (no a checkout/setup-cli
      # ni al resto del job), para minimizar su exposición.
      - name: Link al proyecto
        run: supabase link --project-ref "$PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Aplicar migraciones pendientes
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
